<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xfendziak.pl | montaż</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0a0a0a;
            --text-color: #ededed;
            --accent: #8b5cf6; 
            --border-color: rgba(255, 255, 255, 0.08);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; 
            padding-bottom: 100px;
            min-height: 100vh;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin-bottom: 10px; }
        .subtitle { opacity: 0.5; font-size: 1.1rem; margin-bottom: 30px; }

        .back-link {
            display: inline-block;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .back-link:hover { opacity: 1; transform: translateX(-5px); }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #fff;
            color: #000;
        }

        .resources-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .resource-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: 0.4s var(--ease);
            position: relative;
            display: block; /* Domyślnie widoczne */
        }

        .resource-card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .wave-preview {
            height: 60px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(139, 92, 246, 0.3);
            position: relative;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.1); }

        .resource-info h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .tag {
            display: inline-block;
            font-size: 0.7rem;
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .download-link {
            text-decoration: none;
            display: block;
            margin-top: 20px;
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .download-btn:hover { background: #fff; color: #000; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Wróć do strony głównej</a>
        <h1>Montaż</h1>
        <p class="subtitle">Wszystko czego potrzebujesz do swojego kolejnego montażu.</p>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="wszystko">Wszystko</button>
            <button class="filter-btn" data-filter="sfx">SFX</button>
            <button class="filter-btn" data-filter="muzyka">Muzyka</button>
            <button class="filter-btn" data-filter="animacje">Animacje</button>
            <button class="filter-btn" data-filter="fonty">Fonty</button>
            <button class="filter-btn" data-filter="loga">Loga</button>
            <button class="filter-btn" data-filter="zdjęcia">Zdjęcia</button>
        </div>
    </header>

    <main class="resources-grid" id="resource-container">
        <div class="resource-card" data-category="sfx">
            <span class="tag">SFX</span>
            <div class="wave-preview">
                <button class="play-btn" onclick="previewAudio('link_do_dzwieku.mp3', this)">▶</button>
            </div>
            <div class="resource-info">
                <h3>Whoosh Main</h3>
                <p style="font-size: 0.8rem; opacity: 0.5;">Czysty efekt przejścia typu whoosh.</p>
            </div>
            <a href="link_do_pliku.wav" download class="download-link">
                <button class="download-btn">Pobierz .WAV</button>
            </a>
        </div>

        <div class="resource-card" data-category="animacje">
            <span class="tag">Animacje</span>
            <div class="wave-preview" style="background: rgba(255,255,255,0.03)">
                <span style="font-size: 0.7rem; opacity: 0.4;">Video Preview</span>
            </div>
            <div class="resource-info">
                <h3>Glitch Overlay</h3>
                <p style="font-size: 0.8rem; opacity: 0.5;">Nakładka wideo z efektem błędu.</p>
            </div>
            <a href="link_do_pliku.mp4" download class="download-link">
                <button class="download-btn">Pobierz .MP4</button>
            </a>
        </div>

        <div class="resource-card" data-category="muzyka">
            <span class="tag">Muzyka</span>
            <div class="wave-preview">
                <button class="play-btn" onclick="previewAudio('link_do_muzyki.mp3', this)">▶</button>
            </div>
            <div class="resource-info">
                <h3>Lo-Fi Chill Beat</h3>
                <p style="font-size: 0.8rem; opacity: 0.5;">Idealne podkład pod commentary.</p>
            </div>
            <a href="link_do_pliku.mp3" download class="download-link">
                <button class="download-btn">Pobierz .MP3</button>
            </a>
        </div>
    </main>

    <script>
        // --- LOGIKA FILTROWANIA ---
        const filterBtns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.resource-card');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Zmiana aktywnego przycisku
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                cards.forEach(card => {
                    if (filterValue === 'wszystko' || card.getAttribute('data-category') === filterValue) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        // --- PROSTY PODGLĄD AUDIO ---
        let currentAudio = null;
        let currentBtn = null;

        function previewAudio(url, btn) {
            if (currentAudio && currentBtn === btn) {
                currentAudio.pause();
                currentAudio = null;
                btn.innerText = "▶";
                return;
            }
            
            if (currentAudio) {
                currentAudio.pause();
                currentBtn.innerText = "▶";
            }

            currentAudio = new Audio(url);
            currentBtn = btn;
            currentAudio.play();
            btn.innerText = "⏸";

            currentAudio.onended = () => {
                btn.innerText = "▶";
                currentAudio = null;
            };
        }
    </script>

</body>
</html>
